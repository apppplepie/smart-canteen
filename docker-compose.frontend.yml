# 打包：docker compose -f docker-compose.frontend.yml build
# 本机试跑：根目录 .env 可写 BACKEND_UPSTREAM，再 up -d

services:
  frontends:
    image: ${DOCKERHUB_USER:-creepender42}/scs-frontends:latest
    build:
      context: .
      dockerfile: frontends/Dockerfile
    container_name: scs-frontends
    ports:
      - "${FRONTEND_HOST_PORT:-9080}:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:8081}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
