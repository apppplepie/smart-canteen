server:
  port: 8081  # 8080 被占用且无权限结束时用 8081，前端 .env 填 http://localhost:8081

# 静态图片根目录（其下 food/、commodity/ 对应 /api/images/food/*、/api/images/commodity/*）
# 用引号包住绝对路径，否则 YAML 会把路径里的冒号当键值分隔符；也可改回 ${IMAGES_DIR:./images} 并从项目根启动
scs:
  images-dir: "D:/workspace/code/test/scs/images"

# AI 服务（FastAPI）地址，供 /api/ai/chat 转调
ai:
  service:
    base-url: http://localhost:8000

spring:
  application:
    name: scs-backend
  datasource:
    url: jdbc:mysql://localhost:3306/scs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池（Spring Boot 默认）
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ScsHikariPool
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: true
