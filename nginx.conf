# =========================
# HTTP -> HTTPS
# =========================
server {
    listen 80;
    server_name creepender.top www.creepender.top;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name barevid.creepender.top;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name scs.creepender.top;
    return 301 https://$host$request_uri;
}
# =========================
# HTTPS 主站
# =========================
server {
    listen 443 ssl;
    http2 on;
    server_name creepender.top www.creepender.top;

    ssl_certificate     /etc/nginx/ssl/creepender.top.pem;
    ssl_certificate_key /etc/nginx/ssl/creepender.top.key;

    client_max_body_size 100M;
    proxy_request_buffering off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location = / {
        proxy_pass http://fishbowl_app:3000;
    }

    location ^~ /_next/ {
        proxy_pass http://fishbowl_app:3000;
    }

    location / {
        proxy_pass http://fishbowl_app:3000;
    }
}

# =========================
# barevid 独立子域名
# =========================
server {
    listen 443 ssl;
    http2 on;
    server_name barevid.creepender.top;

    ssl_certificate     /etc/nginx/ssl/barevid.creepender.top.pem;
    ssl_certificate_key /etc/nginx/ssl/barevid.creepender.top.key;

    client_max_body_size 2g;
    proxy_request_buffering off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        proxy_pass http://barevid-api:8000;
    }

    location = /internal {
        return 301 /internal/;
    }

    location ^~ /internal/ {
        proxy_pass http://barevid-api:8000;
    }

    location = /media {
        return 301 /media/;
    }

    location ^~ /media/ {
        proxy_pass http://barevid-api:8000;
    }

    location / {
        proxy_pass http://barevid-web:3000;
    }

    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }
}

# =========================
# scs 独立子域名
# =========================
server {
    listen 443 ssl;
    http2 on;
    server_name scs.creepender.top;
    ssl_certificate     /etc/nginx/ssl/scs.creepender.top.pem;
    ssl_certificate_key /etc/nginx/ssl/scs.creepender.top.key;
    client_max_body_size 100m;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    location = /api {
        return 301 /api/;
    }
    location = /api/images {
        return 301 /api/images/;
    }
    location ^~ /api/images/ {
        proxy_pass http://scs-backend:8081/api/images/;
    }
    location ^~ /api/ {
        proxy_pass http://scs-backend:8081/api/;
    }
    location = /images {
        return 301 /images/;
    }
    location ^~ /images/ {
        proxy_pass http://scs-backend:8081/images/;
    }
    location = /ai {
        return 301 /ai/;
    }
    location ^~ /ai/ {
        proxy_pass http://scs-ai-service:8000/;
    }
    location / {
        proxy_pass http://scs-frontends:80;
    }
    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }
}