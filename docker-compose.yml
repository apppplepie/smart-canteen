# SCS: backend + ai-service + mysql
# Usage: docker compose up -d
# 构建前可先单独拉取镜像：docker pull python:3.12-slim && docker pull eclipse-temurin:17-jdk-alpine && docker pull eclipse-temurin:17-jre-alpine && docker pull mysql:8.0
services:
  mysql:
    image: mysql:8.0
    container_name: scs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scs
      MYSQL_USER: scs
      MYSQL_PASSWORD: scs
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/scs.sql:/docker-entrypoint-initdb.d/01-scs.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    image: ${DOCKERHUB_USER:-creepender42}/scs-ai-service:latest
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: scs-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # 容器内 localhost 不是后端，必须用 compose 服务名访问 Spring Boot
      SPRING_BOOT_BASE_URL: http://backend:8081
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ${DOCKERHUB_USER:-creepender42}/scs-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scs-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/scs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AI_SERVICE_BASE_URL: "http://ai-service:8000"
      SCS_IMAGES_DIR: "/app/images"
    volumes:
      - ./images:/app/images
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started

volumes:
  mysql_data:
