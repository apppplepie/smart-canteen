services:
  mysql:
    image: mysql:8.0
    container_name: scs-mysql
    restart: unless-stopped
    networks:
      - scs
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scs
      MYSQL_USER: scs
      MYSQL_PASSWORD: scs
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scs.sql:/docker-entrypoint-initdb.d/01-scs.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    image: ${DOCKERHUB_USER:-creepender42}/scs-ai-service:latest
    container_name: scs-ai-service
    restart: unless-stopped
    networks:
      scs:
      mystack_default:
        aliases:
          - scs-ai-service
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      VITE_DEEPSEEK_API_KEY: ${VITE_DEEPSEEK_API_KEY:-}
      SPRING_BOOT_BASE_URL: http://backend:8081
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: creepender42/scs-backend:latest
    container_name: scs-backend
    restart: unless-stopped
    networks:
      scs:
      mystack_default:
        aliases:
          - scs-backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://scs-mysql:3306/scs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: scs
      SPRING_DATASOURCE_PASSWORD: scs
      AI_SERVICE_BASE_URL: "http://ai-service:8000"
      SCS_IMAGES_DIR: "/app/images"
    volumes:
      - /srv/scs/images:/app/images:ro
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started

networks:
  scs:
    driver: bridge
  mystack_default:
    external: true

volumes:
  mysql_data: