# 服务器部署用：只拉镜像不构建。用法见下方。
# 1. 把本文件 + deploy/nginx/default.conf 拷到服务器（如 /srv/scs/）
# 2. 建目录并放 scs.sql：mkdir -p backend/src/main/resources，把 scs.sql 放进去
# 3. 设置 DOCKERHUB_USER：export DOCKERHUB_USER=你的用户名 或 .env 里写
# 4. docker compose -f docker-compose.deploy.yml pull && docker compose -f docker-compose.deploy.yml up -d
# 若用主机已有 nginx 反代：不启用下面的 nginx 服务，并暴露 backend/ai 端口，在主机 nginx 里加 location 指向 127.0.0.1:8081 和 8000（见 deploy/nginx/host-nginx-snippet.conf）
# 若 nginx 在博客 Docker 里：让 SCS 加入博客网络，在博客 nginx 配置里用 proxy_pass http://scs-backend:8081 和 http://scs-ai-service:8000（见 deploy/nginx/docker-nginx-snippet.conf）

services:
  # nginx:
#     image: nginx:alpine
#     container_name: scs-nginx
#     restart: unless-stopped
#     ports:
#       - "80:80"
#     volumes:
#       - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
#     depends_on:
#       - backend
#       - ai-service

  mysql:
    image: mysql:8.0
    container_name: scs-mysql
    restart: unless-stopped
    networks:
      - scs
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scs
      MYSQL_USER: scs
      MYSQL_PASSWORD: scs
    # 不映射 3306，避免与博客 fishbowl_mysql 冲突；backend 在容器网络内连 mysql:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scs.sql:/docker-entrypoint-initdb.d/01-scs.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    image: ${DOCKERHUB_USER:-yourname}/scs-ai-service:latest
    container_name: scs-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - scs
      - mystack_default
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      VITE_DEEPSEEK_API_KEY: ${VITE_DEEPSEEK_API_KEY:-}
      SPRING_BOOT_BASE_URL: http://backend:8081
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ${DOCKERHUB_USER:-yourname}/scs-backend:latest
    container_name: scs-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - scs
      - mystack_default
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://scs-mysql:3306/scs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: scs
      SPRING_DATASOURCE_PASSWORD: scs
      AI_SERVICE_BASE_URL: "http://ai-service:8000"
      SCS_IMAGES_DIR: "/app/images"
    volumes:
      - ./images:/app/images
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started

networks:
  scs:
    driver: bridge
  # 博客 compose 创建的网络名，让 nginx 容器能访问 scs-backend / scs-ai-service；若你博客网络名不是 mystack_default 请改这里并在下方各 service 里改
  mystack_default:
    external: true

volumes:
  mysql_data:
