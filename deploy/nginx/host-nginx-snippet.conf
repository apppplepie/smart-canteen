# ---------------------------------------------------------------
# 把下面几段 location 拷到你 443 的 server 里（和 location / 同级）
# 确保 SCS 的 compose 已暴露 8081、8000：docker compose 里 backend ports 8081，ai-service ports 8000
# ---------------------------------------------------------------

    # SCS 后端 API（Spring Boot）
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SCS 静态图片
    location /images/ {
        proxy_pass http://127.0.0.1:8081/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SCS AI 服务（FastAPI，文档 / 健康检查等）
    location /ai/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
