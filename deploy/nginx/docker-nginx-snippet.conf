# ---------------------------------------------------------------
# Nginx 在博客 Docker 里时用这份：把下面几段 location 拷到博客 443 的 server 里（/srv/mystack/nginx/ 下对应配置）
# 前提：SCS 的 compose 已把 backend、ai-service 加入博客网络（见 docker-compose.deploy.yml 的 networks: mystack_default）
# 博客网络名若不是 mystack_default，先在 /srv/scs 执行：docker network ls 看博客 compose 的网络名，再在 deploy 里改成 external 同名
# ---------------------------------------------------------------

    # SCS 后端 API（Spring Boot）
    location /api/ {
        proxy_pass http://scs-backend:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SCS 静态图片
    location /images/ {
        proxy_pass http://scs-backend:8081/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SCS AI 服务（FastAPI）
    location /ai/ {
        proxy_pass http://scs-ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
