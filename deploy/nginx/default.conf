# SCS 反向代理：按路径转发到 backend / ai-service
# 可按需改 server_name、SSL、路径

server {
    listen 80;
    server_name _;   # 改成你的域名，如 api.xxx.com

    client_max_body_size 50M;

    # 后端 API（Spring Boot）
    location /api/ {
        proxy_pass http://scs-backend:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态图片（backend 提供）
    location /images/ {
        proxy_pass http://scs-backend:8081/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI 服务（FastAPI，可选：文档、健康检查等）
    location /ai/ {
        proxy_pass http://scs-ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
