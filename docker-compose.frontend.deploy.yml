# 详见仓库 docs/部署命令备忘.md
# 服务器 /srv/scs/.env 必写 BACKEND_UPSTREAM（后端完整地址，含端口）

services:
  frontends:
    image: ${DOCKERHUB_USER:-creepender42}/scs-frontends:latest
    container_name: scs-frontends
    ports:
      - "${FRONTEND_HOST_PORT:-9080}:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://172.17.0.1:8081}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
