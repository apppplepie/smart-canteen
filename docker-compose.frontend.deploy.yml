# 服务器上只拉前端镜像、不构建。与 docker-compose.deploy.yml 用法一致。
# 服务器用法：
#   export DOCKERHUB_USER=你的用户名   # 或写在 .env
#   docker compose -f docker-compose.frontend.deploy.yml pull
#   docker compose -f docker-compose.frontend.deploy.yml up -d
# 访问：http://服务器IP或域名/（screen）、http://服务器IP或域名/admin、/mobile

services:
  frontends:
    image: ${DOCKERHUB_USER:-yourname}/scs-frontends:latest
    container_name: scs-frontends
    ports:
      - "80:80"
    restart: unless-stopped
